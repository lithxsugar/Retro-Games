<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="0.5"/>
  </pattern>
  <rect width="512" height="512" rx="102" fill="url(#grid)" opacity="0.5"/>
  <!-- Gamepad body -->
  <g filter="url(#neon)">
    <rect x="116" y="192" width="280" height="148" rx="74" fill="url(#glow)" opacity="0.9"/>
  </g>
  <!-- D-pad vertical -->
  <rect x="170" y="218" width="36" height="96" rx="6" fill="#0f172a"/>
  <!-- D-pad horizontal -->
  <rect x="152" y="246" width="72" height="36" rx="6" fill="#0f172a"/>
  <!-- Button A -->
  <circle cx="336" cy="252" r="20" fill="#0f172a"/>
  <!-- Button B -->
  <circle cx="378" cy="272" r="15" fill="#0f172a" opacity="0.7"/>
  <!-- Glow ring -->
  <rect x="116" y="192" width="280" height="148" rx="74" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.4"/>
  <!-- Text -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="42" fill="#22d3ee" opacity="0.8">RETROVERSE</text>
</svg>
